name: Deploy Tribute Page

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub

permissions:
  contents: read
  pages: write
  id-token: write # required for deploy-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # === TOKEN INJECTION ===
      - name: Generate config.js from template (inject secret)
        run: |
          sed 's|%%MY_GITHUB_TOKEN%%|${{ secrets.MY_GITHUB_TOKEN }}|g' config.template.js > config.js
          echo "config.js generated successfully (token injected)"

      # Optional: verify the file exists (token value is masked in logs)
      - name: Verify config.js
        run: |
          ls -la config.js
          echo "config.js is ready for deployment"

      # === SETUP GITHUB PAGES ===
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # === UPLOAD ARTIFACT ===
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # upload everything in the root (index.html, config.js, etc.)

      # === DEPLOY ===
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
